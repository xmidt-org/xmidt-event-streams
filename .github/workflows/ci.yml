---
name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
  
jobs:
  ci:
    uses: xmidt-org/shared-go/.github/workflows/ci.yml@e8e27665ab2158bd4d27d5bc2250e99db7c66ae0 # v4.9.39
    with:
      release-type:         program
      release-main-package: ./cmd/eventstream
      release-docker-file:  .release/Dockerfile
      release-docker:        true
      release-docker-latest: true
      release-docker-major:  true
      release-docker-minor:  true
      release-arch-arm64:    true
      release-arch-amd64:    true
    secrets: inherit
  
      
